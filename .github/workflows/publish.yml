name: Publish @seedui/seedui

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org/'

      - name: Extract version from tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV

      - name: Version consistency check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/seedui/package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "GitHub tag ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi
        shell: bash

      - name: Install dependencies
        run: yarn install

      - name: Build project
        run: yarn build:package:seedui

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/seedui
          npm publish --tag $TAG_VERSION --dry-run
