name: Continuous Integration

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Installing dependencies
        run: yarn install --immutable

      - name: Build Library
        run: yarn build:package:seedui

      - name: Lint
        run: yarn lint
